# Spring Data JPA H2 settings (for easy testing without external DB)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:translationdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update # Use 'update' for development, 'validate' or 'none' for production
spring.jpa.show-sql=true

# Custom property for translation API key
# Requirement: Externalize the API Key using @Value("${translation.api.key}")
translation.api.key=YOUR_GOOGLE_TRANSLATION_API_KEY_GOES_HERE # IMPORTANT: Replace with a real key or a dummy value for local testing

# Optional: Google Translation API URL (default is provided in client, can override here)
# translation.api.google.url=https://translation.googleapis.com/language/translate/v2

# Configure Async Executor (optional but good practice for production)
# These settings control the thread pool for @Async methods.
spring.task.execution.pool.core-size=2      # Number of threads to keep in the pool, even if they are idle
spring.task.execution.pool.max-size=10     # Maximum number of threads that can be in the pool
spring.task.execution.pool.queue-capacity=100 # Queue capacity for tasks awaiting execution
spring.task.execution.thread-name-prefix=Translation-Async- # Prefix for thread names
spring.task.execution.shutdown.await-termination=true # Whether the executor should wait for all tasks to complete on shutdown
spring.task.execution.shutdown.await-termination-period=30s # The maximum time the executor should wait for tasks to complete
