version: '3.8'

services:

  redis:
    image: redis:alpine
    restart: unless-stopped

  worker:
    build: .
    restart: unless-stopped
    command: celery -A server.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - shared_data:/app/shared_data
    env_file:
      - .env
    depends_on:
      - redis

  web:
    build: .
    restart: unless-stopped
    command: uvicorn server.api:app --host 0.0.0.0 --port 8000
    volumes:
      - shared_data:/app/shared_data
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  shared_data:
