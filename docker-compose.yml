version: '3.8'

services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    restart: always
    command: uvicorn server.api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./shared_data:/app/shared_data
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SHARED_DATA_DIR=/app/shared_data
    depends_on:
      - redis
    # Increase shared memory size for potential browser operations or large file buffers
    shm_size: '2gb'

  worker:
    build: .
    restart: always
    command: celery -A server.celery_app worker --loglevel=info
    volumes:
      - ./shared_data:/app/shared_data
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SHARED_DATA_DIR=/app/shared_data
    depends_on:
      - redis
      - web
    # Essential for headless Chrome stability in Docker
    shm_size: '2gb'
    # Clean up zombie processes if Celery crashes hard (though worker.py handles most)
    init: true
