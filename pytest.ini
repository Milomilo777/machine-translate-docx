[pytest]
testpaths = tests
python_files = test_*.py
# Default run skips tests marked `live` — they spawn the launcher subprocess
# and drive Playwright against a real Chromium, which is slow and requires
# an external browser binary. Run them on demand with:
#     pytest -m live
addopts = -ra -q -m "not live"
markers =
    live: end-to-end tests that boot local_launcher.py + drive Chromium via Playwright
