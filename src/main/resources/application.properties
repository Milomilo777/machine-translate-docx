# Disable Web Server - Run as a CLI tool
spring.main.web-application-type=none

# MariaDB / MySQL Configuration (Mirroring translator.py)
spring.datasource.url=jdbc:mariadb://${MARIADB_HOST:localhost}:3306/${MARIADB_DB:translation}?createDatabaseIfNotExist=true
spring.datasource.username=${MARIADB_USER:root}
spring.datasource.password=${MARIADB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# OpenAI API Key Configuration
openai.api.key=${OPENAI_API_KEY:your_api_key_here}
